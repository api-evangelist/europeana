aid: europeana
name: Europeana
description: >-
  Europeana empowers the cultural heritage sector in its digital transformation. It develops expertise, tools, and
  policies to embrace digital change and encourage partnerships that foster innovation, making it easier for people to
  use cultural heritage for education, research, creation, and recreation. The Europeana platform aggregates metadata
  for over 50 million digitized items from more than 3,500 cultural institutions across Europe and exposes them through
  public APIs.
