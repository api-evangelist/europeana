apis:
  - aid: europeana:europeana-search-and-record-api
    name: Europeana Search and Record API
    description: >-
      The Europeana Search and Record API exposes the federated catalog of over 50 million cultural heritage items
      aggregated from European museums, libraries, archives, and audiovisual collections. The Search endpoint supports
      keyword, facet, and filter queries; the Record endpoint returns the full EDM metadata for a single object.
    humanURL: https://pro.europeana.eu/page/intro
